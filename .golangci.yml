version: "2"

linters:
  default: standard
  enable:
    - gocritic
    - gosec
    - unparam
    - errname

  settings:
    gosec:
      excludes:
        - G104

formatters:
  enable:
    - gofumpt
    - gci
  settings:
    gci:
      sections:
        - standard
        - default
        - prefix(github.com/TopPal/NoHandsfree)

issues:
  max-issues-per-linter: 50
  max-same-issues: 5
